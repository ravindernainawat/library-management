<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSphere - Login</title>
  <meta name="description" content="Sign in to BookSphere Library Management System">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #060810;
      --accent: #d4af37;
      --accent-light: #f5cf53;
      --accent-glow: rgba(212, 175, 55, 0.25);
      --glass-bg: rgba(18, 21, 30, 0.5);
      --glass-border: rgba(255, 255, 255, 0.07);
      --glass-blur: blur(28px);
      --text: #f0f0f0;
      --text-secondary: #9ca3af;
      --text-muted: #5b6070;
      --danger: #ff4757;
      --success: #2ed573;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    h1, h2, h3 { font-family: 'Outfit', sans-serif; }

    /* Background */
    .bg-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      animation: orbDrift 25s infinite ease-in-out;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%);
      top: -200px; left: -150px;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
      bottom: -200px; right: -150px;
      animation-delay: -10s;
    }

    @keyframes orbDrift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -40px); }
      66% { transform: translate(-20px, 30px); }
    }

    /* Container */
    .login-page {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 36px;
      transition: all 0.3s ease;
    }
    .back-link:hover { color: var(--accent-light); }
    .back-link svg { width: 16px; height: 16px; }

    /* Main Card */
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .login-card .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .login-card .brand-name {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .login-card .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    /* Role Toggle */
    .role-toggle {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 32px;
      border: 1px solid var(--glass-border);
    }

    .role-toggle-btn {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .role-toggle-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .role-toggle-btn.active {
      background: rgba(212, 175, 55, 0.12);
      color: var(--accent-light);
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
    }

    .role-toggle-btn.active.student-active {
      background: rgba(59, 130, 246, 0.12);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.2);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }
    
    .role-toggle-btn.active.librarian-active {
      background: rgba(46, 213, 115, 0.12);
      color: #2ed573;
      border: 1px solid rgba(46, 213, 115, 0.2);
      box-shadow: 0 4px 15px rgba(46, 213, 115, 0.1);
    }

    /* Form */
    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--text-muted);
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 50px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input::placeholder { color: var(--text-muted); }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
      margin-top: 10px;
    }

    .login-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.4);
    }

    .login-error {
      text-align: center;
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 16px;
      min-height: 20px;
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .login-card { padding: 36px 24px; }
      .login-page { padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  
  <div id="google_translate_element" style="position: absolute; top: 20px; right: 20px; z-index: 100;"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <div class="login-page">

    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>

    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <svg width="36" height="36" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f5cf53" />
              <stop offset="100%" stop-color="#d4af37" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gold)" stroke-width="3.5" />
          <path d="M 50 10 Q 73 50 50 90 Q 27 50 50 10 Z" fill="none" stroke="url(#gold)" stroke-width="3.5" />
          <path d="M 10 50 Q 50 73 90 50 Q 50 27 10 50 Z" fill="none" stroke="url(#gold)" stroke-width="3.5" />
          <circle cx="50" cy="50" r="7" fill="url(#gold)" />
        </svg>
        <span class="brand-name">BookSphere</span>
      </div>
      <p class="tagline">Sign in to your account</p>

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button type="button" class="role-toggle-btn active" id="btn-admin" onclick="selectRole('admin')">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Admin
        </button>
        <button type="button" class="role-toggle-btn" id="btn-librarian" onclick="selectRole('librarian')">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Librarian
        </button>
        <button type="button" class="role-toggle-btn" id="btn-student" onclick="selectRole('student')">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Student
        </button>
      </div>

      <!-- Login Form -->
      <form onsubmit="handleAuth(event)" id="loginForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label for="name">Full Name</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="name" placeholder="John Doe" autocomplete="off">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="off">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
        <div style="text-align:center; margin-top:15px; font-size:0.85rem;">
          <a href="javascript:void(0)" onclick="toggleAuthMode()" style="color:var(--accent); text-decoration:none;" id="toggleLink">Don't have an account? Sign Up</a>
        </div>
        <div class="login-error" id="loginError"></div>
      </form>

      <div class="login-footer">
        BookSphere Library Management System<br>
        All data is stored locally in your browser.
      </div>
    </div>
  </div>

  <script>
    var selectedRole = 'admin';
    var isSignUp = false;

    function selectRole(role) {
      selectedRole = role;

      document.querySelectorAll('.role-toggle-btn').forEach(function(btn) {
        btn.classList.remove('active', 'student-active', 'librarian-active');
      });

      var activeBtn = document.getElementById('btn-' + role);
      activeBtn.classList.add('active');
      if (role === 'student') activeBtn.classList.add('student-active');
      if (role === 'librarian') activeBtn.classList.add('librarian-active');

      document.getElementById('loginError').textContent = '';
    }

    function toggleAuthMode() {
      isSignUp = !isSignUp;
      document.getElementById('nameGroup').style.display = isSignUp ? 'block' : 'none';
      if(isSignUp) document.getElementById('name').setAttribute('required', 'true');
      else document.getElementById('name').removeAttribute('required');
      
      document.getElementById('submitBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.getElementById('toggleLink').textContent = isSignUp ? "Already have an account? Sign In" : "Don't have an account? Sign Up";
      document.querySelector('.tagline').textContent = isSignUp ? "Create a new account" : "Sign in to your account";
      document.getElementById('loginError').textContent = '';
    }

    function handleAuth(event) {
      event.preventDefault();

      var email = document.getElementById('email').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var name = document.getElementById('name') ? document.getElementById('name').value.trim() : "";
      var errorEl = document.getElementById('loginError');

      var endpoint = isSignUp ? '/api/auth/register' : '/api/auth/login';
      var body = { email: email, password: password, role: selectedRole };
      if (isSignUp) body.name = name;
      
      var apiBase = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" ? "http://localhost:5000" : "";

      fetch(apiBase + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          localStorage.setItem('bs_currentUser', JSON.stringify(data.user));
          if (data.token) localStorage.setItem('bs_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = data.message;
        }
      })
      .catch(function() {
        errorEl.textContent = 'Cannot connect to server. Please try again later.';
      });
    }
  </script>
</body>
</html>
